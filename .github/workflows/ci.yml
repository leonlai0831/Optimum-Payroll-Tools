name: CI

# Run on every pull request (the PR gate) and on pushes to main (post-merge
# verification). Feature-branch pushes don't run on their own — open a PR and
# the full suite runs against it. workflow_dispatch allows a manual re-run.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a superseded run when a PR gets a new push; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Type-checking is enforced by `next build` (the build job): a standalone
      # `tsc --noEmit` can't resolve Next's generated route types (RouteContext)
      # without a prior build, so it doesn't belong here.
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The browser suite and the HTTP smoke both gate. Playwright downloads its
      # own browser here (CI has network access) and runs its own dev server.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Browser E2E (Playwright runs its own dev server)
        run: npm run test:e2e
      - name: HTTP integration smoke — gating
        run: |
          npm run dev > dev.log 2>&1 &
          for i in $(seq 1 60); do curl -sf http://localhost:3000/login >/dev/null 2>&1 && break; sleep 1; done
          npm run test:smoke
          pkill -f "next dev" || true
          pkill -f next-server || true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
